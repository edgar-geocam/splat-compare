<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splat Compare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #111; color: #eee; font-family: system-ui, -apple-system, sans-serif; }

        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
            background: #111; z-index: 100;
            font-size: 15px; color: #888;
        }
        #loading.hidden { display: none; }
        #load-status { font-size: 12px; color: #555; }

        #error-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a0000; border: 1px solid #600; padding: 24px;
            border-radius: 8px; z-index: 200; max-width: 600px;
            font-size: 13px; line-height: 1.6; display: none;
        }
        #error-overlay pre { margin-top: 10px; color: #c66; white-space: pre-wrap; font-size: 11px; }

        #viewport {
            position: relative;
            width: 100%;
            height: calc(100vh - 52px);
        }
        #viewport canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .panel-label {
            position: absolute; top: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 3px 10px; border-radius: 3px;
            font-size: 12px; font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            color: #aaa; z-index: 10; pointer-events: none;
            border: 1px solid #333;
        }

        .panel-divider {
            position: absolute; top: 0; bottom: 0; width: 1px;
            background: #2a2a2a; z-index: 10; pointer-events: none;
        }

        #controls {
            height: 52px;
            background: #161616;
            border-top: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
        }

        button {
            background: #2a2a2a; border: 1px solid #444; color: #ccc;
            border-radius: 4px; cursor: pointer;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
        }
        button:hover { background: #383838; border-color: #555; }
        button:active { background: #444; }

        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            height: 4px; background: #333; border-radius: 2px;
            outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 12px; height: 12px; background: #999;
            border-radius: 50%; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb:hover { background: #bbb; }
        input[type="range"]::-moz-range-thumb {
            width: 12px; height: 12px; background: #999;
            border-radius: 50%; cursor: pointer; border: none;
        }

        #progress { flex: 1; }
        #speed-range { width: 50px; }

        .ctrl-text {
            font-size: 11px; color: #555;
            font-family: 'SF Mono', 'Consolas', monospace;
            white-space: nowrap; user-select: none;
        }
        .ctrl-text.bright { color: #888; }

        #shortcuts {
            position: fixed; bottom: 60px; right: 10px;
            font-size: 10px; color: #333;
            font-family: 'SF Mono', 'Consolas', monospace;
            text-align: right; line-height: 1.8;
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div>Loading splats...</div>
        <div id="load-status"></div>
    </div>
    <div id="error-overlay"></div>

    <div id="viewport"></div>

    <div id="controls">
        <button id="play-btn" title="Play/Pause (Space)">&#9654;</button>
        <input type="range" id="progress" min="0" max="1" value="0" step="any">
        <span class="ctrl-text bright" id="frame-info">0 / 0</span>
        <span class="ctrl-text">spd</span>
        <input type="range" id="speed-range" min="1" max="200" value="30">
        <span class="ctrl-text bright" id="speed-val">30</span>
    </div>

    <div id="shortcuts">
        space &middot; play/pause<br>
        &larr; &rarr; &middot; step frame<br>
        [ ] &middot; speed
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';

    const loadingEl = document.getElementById('loading');
    const loadStatusEl = document.getElementById('load-status');
    const errorEl = document.getElementById('error-overlay');

    function showError(msg, detail) {
        errorEl.style.display = 'block';
        errorEl.innerHTML = `<strong>Error</strong><br>${msg}` +
            (detail ? `<pre>${detail}</pre>` : '');
        loadingEl.classList.add('hidden');
    }

    try {
        loadStatusEl.textContent = 'Loading renderer...';
        const GaussianSplats3D = await import(
            'https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js'
        );
        await init(GaussianSplats3D);
    } catch (e) {
        showError(e.message, e.stack);
    }

    async function init(GaussianSplats3D) {
        // ── Load config and camera data ──────────────────────────
        loadStatusEl.textContent = 'Loading camera data...';
        const [config, camerasRaw] = await Promise.all([
            fetch('/config.json').then(r => { if (!r.ok) throw new Error('config.json not found'); return r.json(); }),
            fetch('/cameras.json').then(r => { if (!r.ok) throw new Error('cameras.json not found'); return r.json(); }),
        ]);

        // ── Process camera poses ─────────────────────────────────
        const cameras = camerasRaw
            .sort((a, b) => a.img_name.localeCompare(b.img_name))
            .map(cam => {
                const R = cam.rotation;
                const p = cam.position;

                const m = new THREE.Matrix4();
                m.set(
                    R[0][0], R[0][1], R[0][2], p[0],
                    R[1][0], R[1][1], R[1][2], p[1],
                    R[2][0], R[2][1], R[2][2], p[2],
                    0, 0, 0, 1
                );

                const position = new THREE.Vector3();
                const quaternion = new THREE.Quaternion();
                const scale = new THREE.Vector3();
                m.decompose(position, quaternion, scale);

                const fov = 2 * Math.atan(cam.height / (2 * cam.fy)) * (180 / Math.PI);

                return { position, quaternion, fov };
            });

        if (cameras.length === 0) {
            showError('No cameras found in cameras.json');
            return;
        }

        const totalFrames = cameras.length;
        const numPanels = config.numSplats;

        // ── Set up single renderer ───────────────────────────────
        loadStatusEl.textContent = 'Creating renderer...';
        const viewportEl = document.getElementById('viewport');
        const W = viewportEl.clientWidth;
        const H = viewportEl.clientHeight;

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(W, H);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.autoClear = false;
        viewportEl.appendChild(renderer.domElement);

        // ── Create camera ────────────────────────────────────────
        const panelW = Math.floor(W / numPanels);
        const camera = new THREE.PerspectiveCamera(
            cameras[0].fov, panelW / H, 0.1, 1000
        );

        // ── Create scenes with DropInViewer per splat ────────────
        loadStatusEl.textContent = 'Loading splats...';
        const panels = [];

        for (let i = 0; i < numPanels; i++) {
            const scene = new THREE.Scene();
            const dropIn = new GaussianSplats3D.DropInViewer({
                gpuAcceleratedSort: true,
                sharedMemoryForWorkers: false,
            });
            scene.add(dropIn);
            panels.push({ scene, dropIn });
        }

        // Load all splats in parallel
        const loaded = new Array(numPanels).fill(false);
        function updateLoadStatus() {
            const done = loaded.filter(Boolean).length;
            loadStatusEl.textContent = `Loaded ${done} / ${numPanels} splats...`;
        }

        await Promise.all(
            panels.map((panel, i) =>
                panel.dropIn.addSplatScene(`/splat/${i}.ply`, {
                    splatAlphaRemovalThreshold: 5,
                }).then(() => {
                    loaded[i] = true;
                    updateLoadStatus();
                })
            )
        );

        // ── Add HTML labels and dividers ─────────────────────────
        for (let i = 0; i < numPanels; i++) {
            const label = document.createElement('div');
            label.className = 'panel-label';
            label.style.left = (i * panelW + 8) + 'px';
            label.textContent = config.labels[i];
            viewportEl.appendChild(label);

            if (i > 0) {
                const divider = document.createElement('div');
                divider.className = 'panel-divider';
                divider.style.left = (i * panelW) + 'px';
                viewportEl.appendChild(divider);
            }
        }

        loadingEl.classList.add('hidden');

        // ── Animation state ──────────────────────────────────────
        let playing = false;
        let t = 0;
        let lastTime = 0;
        let speed = 30;
        let dragging = false;

        // ── UI elements ──────────────────────────────────────────
        const playBtn = document.getElementById('play-btn');
        const progressEl = document.getElementById('progress');
        const frameInfoEl = document.getElementById('frame-info');
        const speedRange = document.getElementById('speed-range');
        const speedValEl = document.getElementById('speed-val');

        progressEl.max = totalFrames - 1;
        frameInfoEl.textContent = `1 / ${totalFrames}`;

        playBtn.addEventListener('click', togglePlay);

        progressEl.addEventListener('pointerdown', () => { dragging = true; });
        progressEl.addEventListener('pointerup', () => { dragging = false; });
        progressEl.addEventListener('input', () => { t = parseFloat(progressEl.value); });

        speedRange.addEventListener('input', () => {
            speed = parseInt(speedRange.value);
            speedValEl.textContent = speed;
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            else if (e.code === 'ArrowRight') { e.preventDefault(); t = Math.min(t + 1, totalFrames - 1); progressEl.value = t; }
            else if (e.code === 'ArrowLeft') { e.preventDefault(); t = Math.max(t - 1, 0); progressEl.value = t; }
            else if (e.code === 'BracketRight') { speed = Math.min(speed + 5, 200); speedRange.value = speed; speedValEl.textContent = speed; }
            else if (e.code === 'BracketLeft') { speed = Math.max(speed - 5, 1); speedRange.value = speed; speedValEl.textContent = speed; }
        });

        function togglePlay() {
            playing = !playing;
            playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
        }

        // ── Camera interpolation ─────────────────────────────────
        function getPose(time) {
            const clamped = Math.max(0, Math.min(time, totalFrames - 1));
            const i = Math.floor(clamped);
            const frac = clamped - i;
            const a = cameras[i];
            const b = cameras[Math.min(i + 1, totalFrames - 1)];

            return {
                position: new THREE.Vector3().lerpVectors(a.position, b.position, frac),
                quaternion: new THREE.Quaternion().slerpQuaternions(a.quaternion, b.quaternion, frac),
                fov: a.fov + (b.fov - a.fov) * frac,
            };
        }

        // ── Render loop ──────────────────────────────────────────
        function animate(time) {
            requestAnimationFrame(animate);

            if (playing && !dragging) {
                const dt = lastTime ? (time - lastTime) / 1000 : 0;
                t += dt * speed;
                if (t >= totalFrames - 1) t = 0;
                progressEl.value = t;
            }
            lastTime = time;

            frameInfoEl.textContent = `${Math.floor(t) + 1} / ${totalFrames}`;

            const pose = getPose(t);
            camera.position.copy(pose.position);
            camera.quaternion.copy(pose.quaternion);
            camera.fov = pose.fov;
            camera.aspect = panelW / H;
            camera.updateProjectionMatrix();

            renderer.clear();
            renderer.setScissorTest(true);

            for (let i = 0; i < numPanels; i++) {
                const x = i * panelW;
                renderer.setViewport(x, 0, panelW, H);
                renderer.setScissor(x, 0, panelW, H);
                renderer.render(panels[i].scene, camera);
            }
        }

        requestAnimationFrame(animate);

        // ── Handle resize ────────────────────────────────────────
        window.addEventListener('resize', () => {
            const newW = viewportEl.clientWidth;
            const newH = viewportEl.clientHeight;
            renderer.setSize(newW, newH);
            // Labels/dividers would need repositioning on resize
            // but keeping it simple for now
        });
    }
    </script>
</body>
</html>
